  - name: uninstall-writ
    file: commands/uninstall-writ.md
    category: setup
    purpose: "Remove Writ platform files while preserving `.writ/` project artifacts."
    tags: [setup, uninstall, cleanup]
  - name: update-writ
    file: commands/update-writ.md
    category: setup
    purpose: "Update Writ from upstream with per-file control over local customizations."
    tags: [setup, update, install]
  - name: verify-spec
    file: commands/verify-spec.md
    category: planning
    purpose: "Validate spec integrity, status sync, completion evidence, and contract drift."
    tags: [planning, verification, spec]

agents:
  - name: architecture-check-agent
    file: agents/architecture-check-agent.md
    purpose: "Pre-implementation design review that catches architecture risks before coding."
    model: fast
    model_tier: capability
  - name: coding-agent
    file: agents/coding-agent.md
    purpose: "TDD implementation agent that writes code, follows conventions, and self-verifies."
    model: default
    model_tier: orchestration
  - name: documentation-agent
    file: agents/documentation-agent.md
    purpose: "Framework-adaptive documentation agent for feature, component, and architecture docs."
    model: default
    model_tier: orchestration
  - name: review-agent
    file: agents/review-agent.md
    purpose: "Quality gate agent that verifies acceptance criteria, code quality, tests, and drift."
    model: default
    model_tier: orchestration
  - name: testing-agent
    file: agents/testing-agent.md
    purpose: "Test and coverage agent that verifies pass rate, regressions, and coverage thresholds."
    model: default
    model_tier: orchestration
  - name: user-story-generator
    file: agents/user-story-generator.md
    purpose: "Parallel story authoring agent for create-spec workflows."
    model: fast
    model_tier: capability
  - name: visual-qa-agent
    file: agents/visual-qa-agent.md
    purpose: "Optional UI validation gate that compares implementation screenshots against visual references."
    model: inherit
    model_tier: orchestration

# Skills — capability files (SKILL.md format) loaded explicitly by commands and agents.
# Schema (additive — backward compatible):
#   - name: <kebab-case-name>          # required, unique across commands/agents/skills
#     file: skills/<name>/SKILL.md     # required, must exist on disk
#     description: "<verb-phrase>"     # required, non-empty (see ADR-009 boundary convention)
#     status: <candidate|proven|promoted>  # optional render mirror; defaults to `candidate`
#     tags: [<tag1>, <tag2>]           # optional
#     aliases: [<alias1>]              # optional
# Empty list (`skills: []`) is valid and produces no Skills section in the root SKILL.md.
#
# Lifecycle `status:` (ADR-014 — additive, backward compatible):
#   The SKILL.md frontmatter `status:` is authoritative; this manifest value is a
#   render mirror for the catalog's Status column (exactly like `description:` is
#   mirrored). A missing manifest `status:` renders as `candidate`.
#   State is EARNED from evidence, not asserted:
#     candidate  — 0+ evidence entries (born state from /new-skill)
#     proven     — >=3 well-formed evidence entries
#     promoted   — proven bar PLUS >=1 evidence entry of type: promotion
#   The ladder is monotone (each bar is a strict superset of the one below).
#   The lint (scripts/lint-skill.sh) proves the frontmatter state from evidence.
# See: ADR-009 (.writ/decision-records/adr-009-command-agent-skill-boundary.md)
#      ADR-014 (.writ/decision-records/adr-014-skill-lifecycle.md)
skills:
  - name: code-explanation
    file: skills/code-explanation/SKILL.md
    description: "Explain existing code — its purpose, mechanics, context, and complexity — at a depth proportional to the target."
    status: candidate
    tags: [explanation, documentation, comprehension]
  - name: conventional-commits
    file: skills/conventional-commits/SKILL.md
    description: "Write Conventional Commits messages — type, scope, summary, body, and footers — from a diff, matching the project's existing convention when one exists."
    status: proven
    tags: [git, commits, changelog]
  - name: error-rescue-mapping
    file: skills/error-rescue-mapping/SKILL.md
    description: "Map a data-flow feature's failure modes into Error & Rescue, Shadow Path, and edge-case tables, flagging unplanned handling explicitly."
    status: candidate
    tags: [spec, error-handling, review]
  - name: gbrain-interop
    file: skills/gbrain-interop/SKILL.md
    description: "Route knowledge retrieval brain-first when a healthy GBrain index is detected — cite the canonical markdown path, keep writes markdown-first, and fall back to grep when a brain is absent or unhealthy."
    status: candidate
    tags: [memory, retrieval, interop]
  - name: safe-refactor-loop
    file: skills/safe-refactor-loop/SKILL.md
    description: "Change code structure without changing behavior — one verified, independently revertable commit per concern under a continuously green baseline."
    status: candidate
    tags: [refactor, quality, verification]
  - name: tdd-cycle
    file: skills/tdd-cycle/SKILL.md
    description: "Grow code test-first through the red → green → refactor cycle, one small unit of behavior at a time."
    status: candidate
    tags: [testing, tdd, implementation]
